###############################################################################
# Splunk Enterprise
# File: server.conf
# Project: SOC Home Lab
###############################################################################

###############################################################################
# General Server Settings
###############################################################################

[general]

serverName = Ubuntu-SOC
pass4SymmKey = CHANGE_ME
trustedIP = 127.0.0.1

###############################################################################
# SSL Configuration
###############################################################################

[sslConfig]

enableSplunkdSSL = true

###############################################################################
# HTTP Server
###############################################################################

[httpServer]

enableSplunkWebSSL = true

###############################################################################
# KV Store
###############################################################################

[kvstore]

disabled = false

###############################################################################
# Disk Usage Monitoring
###############################################################################

[diskUsage]

minFreeSpace = 5000

###############################################################################
# License Information
###############################################################################

[license]

activeGroup = Enterprise

###############################################################################
# Notes
#
# Hostname:
#     Ubuntu-SOC
#
# Operating System:
#     Ubuntu 26.04 LTS
#
# Splunk Version:
#     10.x Enterprise
#
# Web Interface:
#     https://10.10.10.10:8000
#
# Management Port:
#     8089/TCP
#
# Receiving Port:
#     9997/TCP
#
# Deployment Role:
#     Standalone Splunk Enterprise Server
#
###############################################################################

