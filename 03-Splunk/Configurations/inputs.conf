###############################################################################
# Splunk Enterprise
# File: inputs.conf
# Project: SOC Home Lab
###############################################################################

# ============================================================================
# Splunk Universal Forwarder Receiver
# ============================================================================

[splunktcp://9997]
disabled = 0
connection_host = ip
queueSize = auto

###############################################################################
# Syslog Receiver (Optional)
###############################################################################

[udp://514]
disabled = 1
connection_host = ip
index = security
sourcetype = syslog

###############################################################################
# TCP Syslog Receiver (Optional)
###############################################################################

[tcp://514]
disabled = 1
connection_host = ip
index = security
sourcetype = syslog

###############################################################################
# Local Monitoring (Example)
###############################################################################

[monitor:///var/log]
disabled = 1
recursive = true
index = main
sourcetype = linux_logs

###############################################################################
# Linux Authentication Logs (Example)
###############################################################################

[monitor:///var/log/auth.log]
disabled = 1
index = security
sourcetype = linux_secure

###############################################################################
# Windows Event Logs
#
# These inputs are collected by the Splunk Universal Forwarder running on the
# Windows endpoint and forwarded to this Splunk Enterprise instance.
###############################################################################

###############################################################################
# Notes
#
# Receiving Port:
#   9997/TCP
#
# Windows Universal Forwarder
#   Destination: Ubuntu-SOC
#
# Forwarded Data
#   - Sysmon Operational Logs
#   - Windows Security Logs
#   - Windows System Logs
#   - Windows Application Logs
#
# Host:
#   Ubuntu-SOC
###############################################################################