###############################################################################
# Splunk Universal Forwarder
# File: outputs.conf
# Project: SOC Home Lab
###############################################################################

# ============================================================================
# Forwarding Destination
# ============================================================================

[tcpout]

defaultGroup = soc_lab_indexer
forwardedindex.filter.disable = true
indexAndForward = false

###############################################################################
# Splunk Enterprise Server
###############################################################################

[tcpout:soc_lab_indexer]

server = 10.10.10.10:9997
autoLB = false
compressed = true

###############################################################################
# Forwarding Behavior
###############################################################################

[tcpout-server://10.10.10.10:9997]

disabled = false

###############################################################################
# Notes
#
# Source Host
#   Windows-SOC
#
# Destination
#   Ubuntu-SOC
#
# Splunk Enterprise
#   10.10.10.10
#
# Receiving Port
#   TCP 9997
#
# Data Forwarded
#   - Sysmon Operational Logs
#   - Windows Security Logs
#   - Windows System Logs
#   - Windows Application Logs
#
# Network
#   Host-Only SOC Network
#
###############################################################################

